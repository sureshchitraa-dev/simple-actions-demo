name: CI Pipeline

on:
  push:
    branches: "main"
  

jobs:
  ping-konnect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install decK
        run: |
          curl -sL https://github.com/kong/deck/releases/download/v1.40.2/deck_1.40.2_linux_amd64.tar.gz | tar xz
          sudo mv deck /usr/local/bin/
      - name: Debug Konnect vars
        run: |
          echo "CP_NAME=[$KONNECT_CP_NAME]"
          echo "ADDR=[$KONNECT_ADDR]"
          echo "PAT length=${#KONNECT_PAT}"
        env:
          KONNECT_CP_NAME: ${{ vars.KONNECT_CP_NAME }}
          KONNECT_PAT: ${{ vars.KONNECT_PAT }}
          KONNECT_ADDR: ${{ vars.KONNECT_ADDR }}
      - name: Ping Konnect
        env:
          KONNECT_CP_NAME: ${{ vars.KONNECT_CP_NAME }}
          KONNECT_PAT: ${{ vars.KONNECT_PAT }}
          KONNECT_ADDR: ${{ vars.KONNECT_ADDR }}
        run: |
          deck gateway ping \
            --konnect-control-plane-name "$KONNECT_CP_NAME" \
            --konnect-token "$KONNECT_PAT" \
            --konnect-addr "$KONNECT_ADDR"
